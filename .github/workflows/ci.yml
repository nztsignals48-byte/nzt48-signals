# L-09: CI/CD Pipeline -- GitHub Actions (skeleton)
name: NZT-48 CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --timeout=60

  invariants:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -c "from core.threshold_registry import ThresholdRegistry; ThresholdRegistry()"
      # TODO: Add more invariant checks

  build:
    runs-on: ubuntu-latest
    needs: [test, invariants]
    steps:
      - uses: actions/checkout@v4
      - run: docker build --build-arg GIT_SHA=${{ github.sha }} -t nzt48:${{ github.sha }} .

  # deploy:

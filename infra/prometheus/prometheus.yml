global:
  scrape_interval: 5s

scrape_configs:
  - job_name: aegis_engine
    static_configs:
      - targets: ["engine:9100"]
  - job_name: aegis_brain
    static_configs:
      - targets: ["brain:9101"]
  - job_name: aegis_scanner
    static_configs:
      - targets: ["scanner:9102"]
  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]

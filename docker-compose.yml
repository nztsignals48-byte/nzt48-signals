# NZT-48 Trading System — Docker Compose
# Engine + API via supervisord | IB Gateway via IBC | Redis for state
# Optimised for AWS EC2 t3.small (upgrading to t3.medium)

services:
  # Trading engine + API server (managed by supervisord)
  nzt48:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # H-03: IMAGE_PARITY — pass git SHA at build time
        # Override via: docker compose build --build-arg GIT_SHA=$(git rev-parse HEAD) nzt48
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: nzt48
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - nzt48-data:/app/data
      - ./config:/app/config:ro
      - ./credentials:/app/credentials:ro
    env_file:
      - .env.production
    environment:
      - NZT48_API_URL=http://localhost:8000
      - GOOGLE_SHEETS_CREDS=/app/credentials/gsheets-service-account.json
      - REDIS_URL=redis://:nzt48redis@redis:6379/0
      - IBKR_HOST=ib-gateway
      - IBKR_PORT=4002   # 4002=paper, 4004=live (gnzsnz image)
    mem_limit: 1536m
    memswap_limit: 2048m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # IB Gateway — headless IBKR API via IBC (auto-reconnect, auto-restart)
  # Image: gnzsnz/ib-gateway (IB Gateway + IBC, Xvfb for headless)
  # PHASE 2b: Enhanced resilience with 2FA timeout auto-recovery
  #
  # 2FA Handling:
  # - TWOFA_TIMEOUT_ACTION=restart: Automatically restarts on 2FA timeout (no manual intervention)
  # - TWOFA_TIMEOUT=120: Gives 2 minutes for 2FA approval before restarting
  # - restart_policy: Auto-restart container on failure (max 5 retries with 10s delay)
  # - healthcheck: Continuous port 4002 monitoring (every 30s, 3 consecutive failures mark unhealthy)
  #
  # Integration with IBGatewayHealthMonitor:
  # - Docker healthcheck monitors port availability continuously
  # - Python monitor_loop() provides application-level health checks (socket-based)
  # - If Docker healthcheck fails 5x: container marked unhealthy (dashboard visible)
  # - If Python monitor detects 3 failures: initiates docker-compose restart
  # - If 2FA timeout occurs: IBC auto-restarts process within container
  #
  # Weekly Maintenance:
  # - Monday morning (07:50 UK): Telegram reminder for 2FA approval
  # - User approves on phone; IBC handles login + 2FA automatically
  # - If approval doesn't happen within 2 minutes: IBC restarts and retries
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: nzt48-ib-gateway
    restart: unless-stopped
    restart_policy:
      condition: on-failure
      max_retries: 5
      delay: 10s
    env_file:
      - .env.production
    environment:
      # TWS_USERID / TWS_PASSWORD / TRADING_MODE injected via env_file (.env.production)
      # Previously used ${IBKR_USERNAME} interpolation which reads from HOST shell, not env_file
      - READ_ONLY_API=false  # Must be false for paper order placement

      # PHASE 2b: 2FA Resilience Configuration
      - TWOFA_TIMEOUT_ACTION=restart  # Auto-restart on 2FA timeout (no manual intervention)
      - TWOFA_TIMEOUT=120             # 2-minute window for 2FA approval before restart

      # Accept API connections from Docker network (nzt48 container connects via bridge IP)
      - TWS_ACCEPT_INCOMING=accept
    expose:
      - "4002"  # Paper trading port
      - "4004"  # Live trading port (unused for now)
    mem_limit: 1024m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      # PHASE 2b Enhanced: Continuous socket test to port 4002
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4002' || exit 1"]
      interval: 30s      # Check every 30 seconds
      timeout: 5s        # Timeout after 5 seconds
      retries: 3         # Mark unhealthy after 3 consecutive failures
      start_period: 60s  # Grace period during startup

  # Redis — Mandate 9: Persistent Chandelier state + session cache
  #
  # H-13: Database separation policy:
  #   DB 0 (default): Critical state — positions, Chandelier exits, circuit breakers,
  #                   kill switch, equity, frozen config. Policy: noeviction (never lose state).
  #   DB 1:           Telemetry/metrics — feature snapshots, ML training buffers,
  #                   CloudWatch scratchpad. Policy: allkeys-lru (evict oldest when full).
  #
  #   The REDIS_URL env var on nzt48 service uses /0 (DB 0) by default.
  #   Telemetry code should use DB 1 via core/redis_config.py constants.
  #   See: core/redis_config.py for REDIS_DB_STATE and REDIS_DB_TELEMETRY constants.
  #
  redis:
    image: redis:7-alpine
    container_name: nzt48-redis
    command: redis-server --appendonly yes --appendfsync everysec --requirepass nzt48redis --maxmemory 400mb --maxmemory-policy noeviction
    # No host port — only accessible via Docker network (security hardening)
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nzt48redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  nzt48-data:
    driver: local
  redis_data:
    driver: local

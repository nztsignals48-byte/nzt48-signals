# ============================================================
# LOOKUP HELPERS
# ============================================================
# The pre-market engine uses these to quickly resolve:
#   1. ETP ticker -> underlying tickers (for scanning pre-market movers)
#   2. US ticker -> which ETPs it appears in (for impact propagation)
#   3. Inverse pairs (for hedging logic)
#
# alias_of: points inverse/leveraged variants to the canonical
# entry so the engine only needs to maintain one set of holdings.
# The direction field tells the engine whether price impact is
# same-direction (LONG) or inverted (SHORT).

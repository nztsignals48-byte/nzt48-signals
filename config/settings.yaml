# === PART III: FIVE-LAYER PERCEPTION ENGINE ===

indicators:
  # Section 6 — 22 Core Indicators
  vwap:
    bands: [1, 2]  # Standard deviations
    timeframe: "1min"
  ema:
    fast: 9
    medium: 20
    slow: 50
    weekly: 50  # 10-week EMA on weekly = 50-period on daily
    timeframes:
      fast_medium: "1min"
      slow: "5min"
      weekly: "1W"
  rsi:
    period: 14
    timeframe: "1min"
    overbought: 70
    oversold: 30
  macd:
    fast: 12
    slow: 26
    signal: 9
    timeframe: "5min"
  atr:
    period: 14
    timeframe: "5min"
  bollinger:
    period: 20
    std_dev: 2
    timeframe: "5min"
  adx:
    period: 14
    timeframe: "5min"
    trending_threshold: 25
    no_trend_threshold: 15
  stochastic_rsi:
    period: 14
    timeframe: "5min"
  keltner:
    period: 20
    atr_mult: 1.5
    timeframe: "5min"
  obv:
    timeframe: "5min"
  mfi:
    period: 14
    timeframe: "5min"
  volume:
    spike_threshold: 2.0  # > 2x avg = strong
    dollar_min_bot_b: 500_000_000  # $500M/day Bot B
    rvol_timeadjust: true
  opening_range:
    periods: [5, 15]  # minutes
    timeframe: "5min"
  microstructure:
    bid_ask_spread_max: 0.15  # percent, skip if >
    timeframe: "1min"

patterns:
  # Section 6 — 12 Pattern Detection
  coiled_spring:
    or_width_pct: 0.50  # OR < 50% of 20-day avg
    confidence_bonus: 15
  volume_climax:
    rvol_threshold: 3.0
  failed_breakout:
    bars_inside: 3
    volume_condition: "fading"
    reverse_confidence_floor: 70
  trend_acceleration:
    consecutive_bars: 3
    confidence_bonus: 10
    trail_multiplier: 1.5
  momentum_exhaustion:
    macd_peaked_bars: 5
    trail_multiplier: 0.5
  vwap_magnet:
    extension_std: 2
  gap_and_go:
    gap_pct: 1.5
    hold_bars: 5
    rvol_min: 2.0
  gap_and_fade:
    gap_pct: 1.5
  earnings_momentum:
    hold_hours: 2
    rvol_min: 2.0
  dead_cat_bounce:
    ema_condition: "EMA9 < EMA20 < EMA50"
  absorption:
    description: "Large vol, small range, then continuation"
    confidence_bonus: 10
  abcd_pattern:
    fibonacci: true

# === Section 7: Regime Classification — 8 States ===

regime:
  states:
    TRENDING_UP_STRONG:
      conditions: "QQQ+SPY > VWAP, EMA(9) > EMA(20), slope > +0.02%/bar"
      long: "Full"
      short: "Counter"
      etp_3x: "80+"
      size: 1.0
    TRENDING_UP_MOD:
      conditions: "1 of 2 > VWAP, slope +0.005 to +0.02"
      long: "Full"
      short: "Counter"
      etp_3x: "75+"
      size: 0.8
    TRENDING_DOWN_STRONG:
      conditions: "QQQ+SPY < VWAP, EMA(9) < EMA(20), slope < -0.02%/bar"
      long: "Counter"
      short: "Full"
      etp_3x: "80+ inv"
      size: 1.0
    TRENDING_DOWN_MOD:
      conditions: "1 of 2 < VWAP, slope -0.005 to -0.02"
      long: "Counter"
      short: "Full"
      etp_3x: "75+ inv"
      size: 0.8
    RANGE_BOUND:
      conditions: "+/-0.3% around VWAP, EMAs flat, VIX 15-22"
      long: "ORB 1R"
      short: "ORB 1R"
      etp_3x: "CASH"
      size: 0.6
    HIGH_VOLATILITY:
      conditions: "VIX > 25 OR range > 2x normal"
      long: "Half"
      short: "Half"
      etp_3x: "CASH"
      size: 0.5
    RISK_OFF:
      conditions: "VIX > 35 OR SPY falls > -2% intraday"
      long: "NO"
      short: "Inv only"
      etp_3x: "CASH"
      size: 0.25
    SHOCK:
      conditions: "VIX > 45 OR circuit breaker"
      long: "FLAT ALL"
      short: "FLAT ALL"
      etp_3x: "FLAT ALL"
      size: 0.0

  # Regime transition actions
  transitions:
    TRENDING_UP_to_RANGE: "Tighten all long stops to breakeven. No new longs."
    TRENDING_UP_to_TRENDING_DOWN: "FLATTEN all longs. Switch to short-hunting."
    TRENDING_DOWN_to_TRENDING_UP: "FLATTEN all shorts. Switch to long-hunting."
    ANY_to_RISK_OFF: "FLATTEN everything. Cash. Wait."
    ANY_to_SHOCK: "EMERGENCY FLATTEN. Kill switch."
    RANGE_to_TRENDING: "Opportunity. Enter trend direction. +10 confidence."

# === Section 8: Market Structure ===

market_structure:
  gex:
    source: "squeezemetrics"
    positive: "dampen moves (mean reversion)"
    negative: "amplify moves (trending/crashing)"
    flipping: "regime change imminent"
  dix:
    bullish_threshold: 0.45
    bearish_threshold: 0.40

# === Section 9: Market Internals ===

market_internals:
  tick:
    bullish: 800
    bearish: -800
  trin:
    bullish_below: 0.80
    bearish_above: 1.20
  add:
    bullish: "rising"
    bearish: "falling"
  vold:
    bullish: 1_500_000_000
    bearish: -1_500_000_000
  composite:
    strong: [3, 4]      # +5 confidence
    weak: [0, 1]         # -5 confidence

# === Section 10: Time-of-Day Engine (ET) ===

time_windows:
  chaos_open:
    start: "09:30"
    end: "09:35"
    strategy: "NO TRADES. Observe only."
  morning_momentum:
    start: "09:35"
    end: "10:30"
    strategy: "PRIMARY WINDOW. Full aggression. ORB."
  trend_extension:
    start: "10:30"
    end: "11:30"

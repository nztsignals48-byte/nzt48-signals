# ==============================================================================
# NZT-48 Live Trading — Docker Compose Configuration
# Production deployment on EC2 (c7i-flex.large)
#
# Services:
#   - aegis-v2-live: Main trading engine (Python + Perfect Entry Timing)
#   - postgres: Trade audit log + compliance database
#   - redis: State persistence (Chandelier exits, circuit breakers)
#   - grafana: Real-time monitoring dashboard
#
# Networks: Shares ib-gateway with main V1 engine (IB Gateway on :4004)
# Volumes: /data/trades, /data/positions, /logs
# ==============================================================================

version: '3.8'

services:
  # Main live trading engine
  aegis-v2-live:
    build:
      context: ..
      dockerfile: docker/Dockerfile.aegis-v2-live
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: aegis-v2-live
    restart: on-failure:5
    ports:
      - "8000:8000"  # Metrics + control API
    volumes:
      - ./data/trades:/app/data/trades
      - ./data/positions:/app/data/positions
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./credentials:/app/credentials:ro
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: "Europe/London"
      IBKR_HOST: "ib-gateway"
      IBKR_PORT: "4004"  # Live account port (4002=paper)
      IBKR_CLIENT_ID: "101"
      DATABASE_URL: "postgresql://nzt48:nzt48_secure@postgres:5432/trades_live"
      REDIS_URL: "redis://:nzt48redis@redis:6379/0"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    mem_limit: 1536m
    memswap_limit: 2048m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - nzt48-live
      - nzt48-default  # Shared with V1 (ib-gateway)

  # PostgreSQL — ISA-compliant trade audit log
  postgres:
    image: postgres:16-alpine
    container_name: nzt48-postgres-live
    restart: unless-stopped
    environment:
      POSTGRES_USER: nzt48
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nzt48_secure}
      POSTGRES_DB: trades_live
      TZ: "Europe/London"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nzt48"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nzt48-live

  # Redis — State persistence (Chandelier exits, circuit breakers)
  redis:
    image: redis:7-alpine
    container_name: nzt48-redis-live
    restart: unless-stopped
    command: redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass nzt48redis
      --maxmemory 400mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nzt48redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nzt48-live

  # Grafana — Real-time monitoring dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: nzt48-grafana-live
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
      TZ: "Europe/London"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/live_trading.json:ro
      - ./monitoring/grafana_datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      - "3000:3000"
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - prometheus
    networks:
      - nzt48-live

  # Prometheus — Metrics scraping (from aegis-v2-live /metrics endpoint)
  prometheus:
    image: prom/prometheus:latest
    container_name: nzt48-prometheus-live
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nzt48-live

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  nzt48-live:
    driver: bridge
  nzt48-default:
    external: true  # Shared with V1 docker-compose (ib-gateway)

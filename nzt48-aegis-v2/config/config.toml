# Sprint 6: Entry type base confidences — Ouroboros tunes nightly based on rolling Wilson score.
[entry_types]
type_a_confidence = 68.0              # DipRecovery — TIGHTENED thresholds (was WR=39%, need more selective entries)
type_b_confidence = 85.0              # EarlyRunner — TIGHTENED (WR=46% PF=2.6, walk-forward unstable)
type_c_confidence = 68.0              # OverboughtFade — TIGHTENED thresholds (was WR=39%, need more extreme RSI)
type_d_confidence = 68.0              # SupportBounce — TIGHTENED thresholds (was WR=39%, need tighter proximity)
# Type A thresholds — TIGHTENED: deeper dip + stronger volume for higher conviction
type_a_rsi_oversold = 30.0            # Was 40 — require deeper oversold for genuine dip
type_a_volume_spike_mult = 2.5        # Was 1.8 — require stronger panic volume
type_a_drop_atr_mult = 2.5            # Was 2.0 — require larger price drop from recent high
# Type B thresholds
type_b_rsi_low = 20.0                 # S4B: Was 30 — widened to catch more real entries
type_b_rsi_high = 80.0                # S4B: Was 70 — widened to catch more real entries
type_b_momentum_bars = 3
# Type C thresholds — TIGHTENED: more extreme overbought for higher conviction fade
type_c_rsi_overbought = 80.0          # Was 75 — require more extreme overbought
# Type D thresholds — TIGHTENED: closer to daily low + narrower RSI band
type_d_price_proximity_pct = 0.5      # Was 1.0 — must be within 0.5% of daily low (right at support)
type_d_rsi_low = 25.0                 # Was 20 — narrower band
type_d_rsi_high = 35.0                # Was 40 — narrower band, more oversold required
# Confidence decay
confidence_decay_rate_per_hour = 2.1
# Type E thresholds (IBS Mean Reversion — WR=52% PF=8.8, walk-forward STABLE)
type_e_confidence = 72.0              # SHADOW PROMOTE — above 65 floor, will generate signals
type_e_ibs_threshold = 0.30           # S4C: Was 0.10 — aligned with IBS_MR generator (bridge.py:1359)
type_e_rvol_threshold = 1.0
# Type F thresholds (OBV Divergence — WR=72% PF=33.3, walk-forward IMPROVES OOS)
type_f_confidence = 75.0              # SHADOW PROMOTE — strongest signal in backtest
type_f_obv_rsi_threshold = 30.0
type_f_rvol_threshold = 0.7

# Sprint 6: Risk arbiter hardening — thresholds previously hardcoded as constants.
[hardening]
# System-wide velocity: max entries per 5-minute window across ALL tickers.
system_velocity_max = 10
# Kelly ramp: number of trades before full Kelly applied.
kelly_ramp_target = 50                # Was 250 — faster ramp for paper validation (reach full Kelly at 50 trades)
kelly_ramp_clamp_min = 0.5                # Was 0.3 — start at 50% Kelly during ramp for faster capital deployment.
kelly_ramp_clamp_max = 1.0
# VIX hysteresis deadband (enter/exit thresholds with 3-5 point gap).
vix_high_enter = 25.0
vix_high_exit = 22.0
vix_extreme_enter = 35.0
vix_extreme_exit = 30.0
# GARCH volatility ceiling (base, leverage-scaled via √leverage).
garch_threshold_base = 0.80
# CVaR heat multiplier (CVaR limit = Nx basic heat limit).
cvar_heat_multiplier = 1.5
# Momentum re-entry IC thresholds (Wilson score).
reentry_3pos_ic = 0.20
reentry_3pos_trades = 20
reentry_2pos_ic = 0.10
reentry_2pos_trades = 10
# Macro stress + stale tick threshold (seconds).
macro_stress_stale_tick_secs = 60
# Drawdown velocity: equity drop % in 1 hour → HALT.
drawdown_velocity_pct = 2.0
drawdown_velocity_window_secs = 3600
# Equity snapshot recording interval and retention.
equity_snapshot_interval_secs = 60
equity_snapshot_retention_secs = 7200
# Spread/edge rejection multiplier.
spread_edge_ratio = 2.0
# Scanner score minimum threshold.
scanner_score_min = 30.0
# Kelly fraction floor.
kelly_fraction_floor = 0.005

# Sprint 6: Broker resilience — watchdog, circuit breaker, order lifecycle.
[hardening.broker]
tick_watchdog_timeout_secs = 120
broker_disconnect_escalate_secs = 10
zombie_halt_timeout_mins = 30
circuit_breaker_errors = 5
circuit_breaker_window_secs = 60
circuit_breaker_cooldown_secs = 30
# Order lifecycle timeouts.
order_ack_timeout_secs = 5
order_fill_timeout_secs = 60
order_max_retries = 3
# P3.6: Reconnect backoff params (used by BrokerHealthMonitor::next_reconnect_delay_ms).
# base_backoff_ms * 2^attempts, capped at max_backoff_ms, plus deterministic jitter mod jitter_mod_ms.
base_backoff_ms = 1000
max_backoff_ms = 30000
jitter_mod_ms = 1000

# Sprint 6: Stale tick threshold for signal rejection (ms). Separate from config staleness.
[hardening.ticks]
stale_tick_ms = 500
bar_history_ttl_secs = 3600
signal_cooldown_ticks = 60            # Per-ticker cooldown (60 ticks × 5s = 5 min)

# Sprint 6: Position sizing gates.
[hardening.sizing]
min_trade_gbp_sim = 20.0
min_trade_gbp_live = 50.0
high_price_guard_sim = 2000.0
stop_pct_clamp_min = 0.01
stop_pct_clamp_max = 0.10
cold_start_stop_pct = 0.05
kelly_notional_floor_gbp = 100.0
kelly_notional_cap_pct = 0.25
gbx_threshold = 500.0                   # P2-#6: LSE GBP prices above this → divide by 100 (GBX→GBP)

# ============================================================================
# [simulation] — Override values when AEGIS_SIM_MODE=1 (backtesting/sim only).
# These values are ONLY used by Python backtesting scripts. Rust engine reads
# from [risk]/[position]/[hardening] directly; see Rust limits doc below.
# When running production_backtest.py or backfill_simulator.py with
# AEGIS_SIM_MODE=1, these values override the equivalent live settings.
# ============================================================================
[simulation]
max_daily_trades = 999999            # No daily trade cap in sim
max_simultaneous_positions = 999     # No position cap in sim
signal_cooldown_ticks = 0            # No per-ticker cooldown in sim
system_velocity_max = 999999         # No system-wide velocity cap in sim
per_ticker_velocity_max = 999999     # No per-ticker velocity cap in sim
consecutive_loss_halt = 999999       # Never halt on consecutive losses in sim
daily_drawdown_pct = 100.0           # Never halt on daily drawdown in sim
weekly_drawdown_pct = 100.0          # Never halt on weekly drawdown in sim
peak_drawdown_halt_pct = 100.0       # Never halt on peak drawdown in sim
portfolio_heat_limit_pct = 100.0     # No portfolio heat limit in sim
sector_heat_cap_pct = 100.0          # No sector heat limit in sim
cash_buffer_pct = 0.0                # No cash buffer requirement in sim
entry_cooldown_bars = 0              # No between-entry cooldown in backfill_simulator

# OUROBOROS LEARNING CONTROL
# observe_only = true: nightly_v6 still RUNS and ANALYZES, but config_writer will NOT
# mutate dynamic_weights.toml. Prevents ML loop from optimizing on N=48 trades.
# Set to false once 300+ spread-adjusted trades exist in system_memory.json.
[ouroboros]
observe_only = true
min_trades_for_mutation = 30

# TIME-STOP: Maximum minutes to hold a position that hasn't reached Rung 2 (breakeven).
# After this many minutes, Rust exit_engine should tighten stop aggressively.
# NOTE: Currently Rust does NOT read this — it's a config placeholder for the next
# Rust rebuild. The Python bridge emits max_hold_minutes in signal metadata.
[exit_time_stop]
enabled = true
max_minutes_to_rung2 = 45
aggressive_trail_atr = 0.3

[crucible]
# Crucible phase overrides (Days 1-30)
# AUDIT-FIX: Was 20, which allows unrealistic over-deployment at £10k equity.
# Risk officer: "20 positions at 10k is insane overexposure even in simulation."
max_positions_override = 5           # Paper: 5 concurrent positions for data collection. Live mode uses risk.max_positions.
paper_mode = true                    # PAPER: Simulated orders. IS_LIVE=false. April 7+ go live.
starting_equity_gbp = 100000         # Simulation starting equity. Live mode overrides via IBKR reqAccountSummary.
# P2-B0.6: Enable live risk gates in paper mode. Paper results now match live behavior.
# The 9 previously-bypassed checks (positions, heat, drawdown, equity floor) are now enforced.
paper_uses_live_gates = true


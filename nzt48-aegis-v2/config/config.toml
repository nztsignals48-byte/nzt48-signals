# AEGIS V2 — Static Configuration
# This file contains ALL configurable parameters.
# Code MUST reference these constants, not literal values (H109).

[signal]
# N0c: Raised from 45 → 65. At 45%, coin-flip signals waste cost budget.
confidence_floor = 65
outlier_win_cap_pct = 3.0
gap_detection_pct = 2.0
erroneous_tick_deviation_pct = 5.0
velocity_check_window_secs = 1
velocity_check_max_intents = 5

[position]
# AUDIT-ADJUSTED (2026-03-18): Max 3 at £10k equity.
# Fund manager: "Max 2-3 at £10k. £9,000 committed = 90% is suicidal."
# Risk officer: "committed capital must never exceed 75% of equity"
max_simultaneous_positions = 15   # PAPER VALIDATION: Maximise trade data for Ouroboros learning. Revert to 3 for live.
# Portfolio heat = sum((entry_price - stop_price) * qty / total_equity)
portfolio_heat_limit_pct = 50.0   # PAPER VALIDATION: Relaxed for data collection. Revert to 10 for live.
sector_heat_cap_pct = 80.0        # PAPER VALIDATION: Relaxed. Revert to 33 for live.
cash_buffer_pct = 5.0             # PAPER VALIDATION: Relaxed. Revert to 25 for live.
isa_annual_limit_gbp = 20000      # Tracked in WAL, enforced by RiskArbiter
isa_tax_year_start = "04-06"      # 6 April UK tax year start

[kelly]
fraction_cap = 0.5
clamp_max = 0.20
volatility_drag_3x = 9
volatility_drag_5x = 25

[timing]
# ALL LSE times are in LONDON LOCAL TIME (Europe/London timezone).
# During GMT (Nov-Mar): these are UTC. During BST (Mar-Oct): UTC = local - 1h.
# Use chrono-tz crate, NEVER hardcode UTC offsets.
stale_data_threshold_secs = 120
entry_cutoff_london = "15:45"     # London local time
lse_open_london = "08:00"         # London local time
lse_close_london = "16:30"        # London local time
auction_open_start = "07:50"      # London local time
auction_open_end = "08:00"        # London local time
auction_close_start = "16:30"     # London local time
auction_close_end = "16:35"       # London local time
eod_flatten_time = "16:25"        # London local time
eod_flatten_phase1 = "15:55"      # T-35: passive limit at mid+1tick
eod_flatten_phase2 = "16:15"      # T-15: limit at mid
eod_flatten_phase3 = "16:25"      # T-5: MTL emergency
gap_cooldown_mins = 15
synthetic_halt_limp_secs = 30     # Per-ticker Limp Mode threshold
synthetic_halt_full_secs = 120    # Per-ticker full HALT threshold

# Sprint 7: Per-exchange entry cutoffs (local time at each exchange).
# Engine checks ticker's exchange → applies correct cutoff.
# Format: "HH:MM" in exchange-local timezone.
[timing.exchange_cutoffs]
LSE = "15:45"                     # London local (45min before 16:30 close)
US = "15:30"                      # New York local (30min before 16:00 close)
HKEX = "15:30"                    # Hong Kong local (30min before 16:00 close)
TSE = "14:30"                     # Tokyo local (30min before 15:00 close)
XETRA = "17:00"                   # Frankfurt local (30min before 17:30 close)
EURONEXT = "17:00"                # Paris local (30min before 17:30 close)
SGX = "16:30"                     # Singapore local (30min before 17:00 close)

[volatility]
# Yang-Zhang (2000) estimator — mandatory for Moreira-Muir scaling
# The ONLY estimator that handles overnight gaps in leveraged ETPs
yz_rolling_window = 10            # 10-bar rolling for real-time
yz_nightly_window = 20            # 20-bar for nightly recalibration
vol_target_annual_pct = 15.0      # Portfolio vol target
vol_high_threshold = 1.5          # > 1.5x historical -> reduce 30%
vol_extreme_threshold = 2.0       # > 2.0x historical -> reduce 60%

[risk]
# AUDIT-ADJUSTED (2026-03-18)
# Risk officer: "2% daily too tight for 3x ETP vol. Single TSL3.L stop = 3%."
# Quant: "Replace consecutive loss halt with daily loss budget."
daily_drawdown_pct = 4.0           # Was 2.0%. Realistic for 3x ETP volatility.
weekly_drawdown_pct = 7.0          # NEW: Weekly loss limit (risk officer M-1)
peak_drawdown_halt_pct = 15.0      # NEW: Trailing drawdown from HWM → full halt (M-2)
equity_floor_pct = 70.0            # NEW: Hard floor at 70% of initial equity (K-2)
overnight_exposure_cap_pct = 50.0  # NEW: Max 50% of equity in overnight holds (M-3)
max_correlated_positions = 3       # NEW: Max positions in >0.7 correlated instruments (M-5)
max_risk_per_trade_pct = 0.75      # NEW: Dynamic sizing: position = (risk% × equity) / stop_width
spread_veto_pct = 0.3              # Was 0.5%. Tightened per quant audit.
slippage_assumption_pct = 0.5      # Was 1.0%. More realistic for paper.
consecutive_loss_halt = 5          # Was 3. Audit: "3 too aggressive, triggers 1 in 6 sequences at 45% WR"
# N0a: Daily trade frequency limit — THE #1 survival lever.
# At 0.50% round-trip cost, each trade costs ~£10 on £2K position.
# 3 trades/day × 252 days = £7,560/year = 76% equity drag on £10K.
max_daily_trades = 10              # PAPER VALIDATION: Raised from 3 to collect more data. Revert to 3 for live.
# N0d: Minimum gross edge gate — reject trades where expected edge < 2×spread.
# Prevents cost-killed trades (L5 Spread Victims).
min_gross_edge_pct = 0.15          # N0d: Entry must expect >0.15% gross move to cover costs.
reject_to_halt_count = 3
reject_to_halt_window_secs = 60

# VIX-tiered response (risk officer Item 8)
[risk.vix_tiers]
low_max = 18                       # VIX < 18: full allocation
elevated_max = 25                  # VIX 18-25: 50% max allocation, tighten stops
high_max = 35                      # VIX 25-35: 25% allocation, inverse only, no overnight
crisis_max = 50                    # VIX 35-50: SUSPEND all 3x longs. Inverse-only.
extreme = 50                       # VIX > 50: FULL TRADING HALT. Exits only.

# Q-051: UNIFIED COST MODEL — single source of truth for all cost parameters.
# ALL cost-related code MUST reference these values, not hardcode numbers.
# Replaces scattered hardcoded values in exit_engine.rs, smart_router.rs, and Python.
[costs]
# Round-trip trading cost as fraction (entry + exit spread + commission amortized).
# Used by Chandelier Rung 2 breakeven calculation and Kelly sizing.
round_trip_fee_pct = 0.003           # 0.3% round-trip — conservative for LSE 3x ETPs
# IBKR tiered commission minimum per trade (GBP).
ibkr_commission_gbp = 1.70           # IBKR tiered minimum for UK ISA
# Stamp duty (UK equities only — ETPs are exempt)
stamp_duty_pct = 0.0                 # 0% for ETPs/ETFs (would be 0.5% for UK equities)
# Financial Transaction Tax (0 for LSE ETPs)
ftt_pct = 0.0                        # 0% for UK ISA ETPs
# FX conversion cost (for USD-denominated LSE ETPs)
fx_conversion_pct = 0.002            # 0.2% IBKR FX spread estimate

[execution]
marketable_limit_buffer_pct = 0.1
tick_size_under_1 = 0.001
tick_size_over_1 = 0.01

[channel]
capacity = 50000
reduce_threshold = 40000
halt_threshold = 50000
tick_drop_alert_per_sec = 100

[backpressure]
warning_ms = 500
reduce_ms = 2000

[reconciliation]
interval_secs = 300
orphan_ack_timeout_secs = 5

[ibkr]
client_id_executioner = 101
client_id_ouroboros = 200
reconnect_backoff_secs = [1, 2, 4, 8, 16, 32, 60]
rate_limit_msgs_per_sec = 50
reqmktdata_pacing_ms = 10
historical_data_max_per_10min = 60
max_simultaneous_lines = 100        # Free IBKR default, no Quote Boosters

[rotation]
# Dynamic subscription rotation — 100 free lines across 1,000 tickers
tier1_permanent_lines = 50           # Top 50 Vanguard, always subscribed
tier2_rotating_lines = 50            # Shared between Vanguard warm + Apex
tier2_rotation_secs = 60             # Rotate every 60 seconds
tier2_vanguard_batches = 5           # 250 Vanguard warm in 5 batches
tier3_apex_batches = 14              # 700 Apex in 14 batches
tier1_promotion_confidence = 80      # Promote warm->hot if signal > 80
full_vanguard_scan_mins = 5          # Complete Vanguard warm scan
full_apex_scan_mins = 15             # Complete Apex scan
open_position_always_tier1 = true    # Tickers with positions = permanent

[wal]
schema_version = 1

[inverse_pairs]
# If long is open, its inverse is blocked (H32). Vice versa.
# Format: [[long_ticker, short_ticker]]

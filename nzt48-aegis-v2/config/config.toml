US = 90                              # seconds
TSE = 180                            # seconds — lower tick frequency
HKEX = 150                           # seconds
XETRA = 120                          # seconds
EURONEXT = 120                       # seconds
SGX = 180                            # seconds — lower tick frequency

# P3.5: Economic blackout window per event type (minutes before AND after event).
# Engine suspends new entries within this window. Overrides default 15min for specific events.
# FOMC/NFP have outsized impact → wider windows. Regional events → tighter.

# Sprint 6: Chandelier exit ladder — all rung thresholds and trail multipliers configurable.
# Ouroboros tunes nightly via dynamic_weights.toml chandelier_atr_mult overlay.
[chandelier]
# Percentage gain thresholds to reach each rung [rung1=entry, rung2, rung3, rung4, rung5].
# Audit-restructured (2026-03-18) for compounding optimality: tighter rungs.
rung_pct = [0.0, 0.008, 0.015, 0.025, 0.040]
# Initial stop: entry - Nx ATR. BT-003: optimal=1.5 (PF 1477 vs 1319 at 2.0).
initial_stop_atr_mult = 1.5
# Trailing ATR multipliers per rung (rung 3, 4, 5+). Tighter = less profit given back.
rung3_trail_atr = 1.0
rung4_trail_atr = 0.75
rung5_trail_atr = 0.5
# ATR floor as fraction of entry price (prevents zombie stops on cold start).
atr_floor_pct = 0.005
# Price spike filter threshold (fraction). 10% = 0.10.
price_spike_pct = 0.10
# Dust threshold in GBP. Remainder below this → market sell.
dust_threshold_gbp = 500.0

# Sprint G: Volume exhaustion exit — tighten stop when RVOL signals climactic reversal.
# When current RVOL exceeds rvol_exhaustion_mult (i.e., volume is 10x normal),
# the Chandelier stop tightens to tight_stop_atr × ATR below peak.
[chandelier.exhaustion]
enabled = true
rvol_exhaustion_mult = 10.0    # When current RVOL > 10x average, treat as exhaustion
tight_stop_atr = 0.5           # Tighten stop to ATR 0.5 during exhaustion

# Sprint 6: InfiniteChandelier adaptive multiplier bounds.
# Each pair is [min, max]. Engine clamps to these ranges.
[chandelier.adaptive]
volatility_range = [0.8, 1.5]        # Low vol → tighter, high vol → wider
volatility_ann_low = 0.20             # Below 20% annualized → min multiplier
volatility_ann_high = 0.50            # Above 50% annualized → max multiplier
time_decay_range = [0.8, 1.0]         # Open → 1.0, close → 0.8
time_decay_slope = 0.2                # Linear tightening rate
momentum_range = [1.0, 1.3]           # Strong momentum → wider trail
momentum_sensitivity = 10.0           # Multiplier slope
liquidity_range = [1.0, 1.4]          # Illiquid → wider stops
liquidity_sensitivity = 40.0          # Amihud slope
heat_range = [0.7, 1.0]              # High heat → tighter
heat_low_pct = 2.0                    # Below 2% heat → neutral (1.0)
heat_high_pct = 8.0                   # Above 8% heat → tightest (0.7)
regime_reduce_mult = 0.6              # REDUCE regime multiplier
mega_runner_threshold_atr = 3.0       # Profit > 3 ATR → activate bonus
mega_runner_slope = 0.2               # Widening rate per ATR above threshold
mega_runner_range = [1.0, 2.0]        # Max 2x trail width for runners

# Book 39: Per-strategy exit overrides. Strategies not listed use global [chandelier] defaults.
# Each strategy can customize: initial_stop_atr_mult, rung_pct, time_stop_max_minutes, exit_mode.
[chandelier.per_strategy.S2_Reversion]

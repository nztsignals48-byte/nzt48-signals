full_apex_scan_mins = 120            # Apex snapshot scan every 2 hours
open_position_always_tier1 = true    # Tickers with positions = permanent
# Total unique tickers scanned per cycle: 50 permanent + 50 rotating × 5 cycles = 300
total_scan_universe = 300

# ── 80/20 Dynamic Ticker Scanning Architecture ──
# IBKR hard limit: 100 concurrent reqMktData streams per client.
# Split into CORE (session-aware, always-on) + DARK HORSE (unusual movers, rotated).
# Core tickers provide stable signal generation on the most liquid instruments.
# Dark horse tickers discover intraday outliers (gap openings, volume spikes, unusual moves).
[scanner]
# Total IBKR streaming slots (must match ibkr.max_simultaneous_lines)
max_streams = 200
# Core universe: always-on, session-aware, top liquid stocks
core_slots = 160
# Dark horse: unusual movers, rotated every 15 min
dark_horse_slots = 40
# Core rotation interval (seconds). Core 80 rotate every 2 hours to scan full universe.
# Over 22 trading hours: 11 rotations × 80 = 880 slot-fills → ~200-300 unique tickers/day.
core_rotation_secs = 7200
# Dark horse rotation interval (seconds). Dark horse 20 rotate every 15 min.
# Over 22 hours: 88 rotations × 20 = 1,760 slot-fills → ~100+ unique unusual movers/day.
dark_horse_rotation_secs = 900
# Dark horse detection criteria — ticker qualifies if ANY threshold is exceeded
dark_horse_min_rvol = 3.0            # RVOL > 3x 20-day average to qualify as unusual
dark_horse_min_gap_pct = 1.5         # Absolute gap > 1.5% vs prev close to qualify
dark_horse_min_volume_rank = 0.9     # Top 10% volume for the day to qualify

# Session-aware allocation of CORE slots (80 total).
# During each exchange's session, that exchange gets more of the 80 core slots.
# Tickers from closed exchanges still get off_session_reserve slots for pre-market scanning.
# Actual allocation depends on which markets are open (may exceed per-exchange target).
[scanner.session_allocation]
TSE_during_asia = 50                 # 23:00-08:00 UTC — doubled from 25
HKEX_during_asia = 40                # doubled from 20
SGX_during_asia = 10                 # doubled from 5
KRX_during_asia = 10                 # NEW — Korean market
ASX_during_asia = 10                 # NEW — Australian market
LSE_during_europe = 50               # 07:00-16:30 UTC — doubled from 25
XETRA_during_europe = 20             # doubled from 10
EURONEXT_during_europe = 15          # tripled from 5
US_during_us = 80                    # 13:30-21:00 UTC — doubled from 40
US_during_overlap = 50               # 13:30-16:30 UTC (US + LSE both open)
LSE_during_overlap = 40              # doubled from 20
# Slots reserved for off-session tickers (pre-market scanning, overnight movers)
off_session_reserve = 20             # doubled — more pre-market coverage

# IBKR Market Scanner — real-time reqScannerSubscription to discover dark horse candidates.

[risk]
# AUDIT-ADJUSTED (2026-03-18)
# Risk officer: "2% daily too tight for 3x ETP vol. Single TSL3.L stop = 3%."
# Quant: "Replace consecutive loss halt with daily loss budget."
daily_drawdown_pct = 4.0           # Was 2.0%. Realistic for 3x ETP volatility.
weekly_drawdown_pct = 7.0          # NEW: Weekly loss limit (risk officer M-1)
peak_drawdown_halt_pct = 15.0      # NEW: Trailing drawdown from HWM → full halt (M-2)
equity_floor_pct = 70.0            # NEW: Hard floor at 70% of initial equity (K-2)
overnight_exposure_cap_pct = 50.0  # NEW: Max 50% of equity in overnight holds (M-3)
max_correlated_positions = 3       # NEW: Max positions in >0.7 correlated instruments (M-5)
max_risk_per_trade_pct = 0.75      # NEW: Dynamic sizing: position = (risk% × equity) / stop_width
max_entry_pct_of_equity = 0.25     # Cap any single entry at 25% of equity
spread_veto_pct = 0.3              # Was 0.5%. Tightened per quant audit.
slippage_assumption_pct = 0.5      # Was 1.0%. More realistic for paper.
consecutive_loss_halt = 5          # LIVE: 5 consecutive losses → halt. Conservative for £10K capital preservation.
# N0a: Daily trade frequency limit.
max_daily_trades = 5               # Paper needs more data; will tighten for live.
max_trades_per_strategy_per_day = 2  # Slot governance: prevent single strategy dominating
max_trades_per_symbol_per_day = 1    # Slot governance: max 1 entry per symbol per day
# N0d: Minimum gross edge gate — reject trades where expected edge < 2×spread.
# Prevents cost-killed trades (L5 Spread Victims).
min_gross_edge_pct = 0.15          # LIVE: 15bps minimum edge. Below this, commission drag kills P&L.
reject_to_halt_count = 3
reject_to_halt_window_secs = 60
# Book 7: Session exposure limits (% of equity per session). Was hardcoded in risk_arbiter.rs.
session_asia_limit_pct = 30.0
session_europe_limit_pct = 50.0
session_us_limit_pct = 60.0
session_overlap_limit_pct = 80.0
# Sprint 2: EVT CVaR tail risk base threshold (scaled by 1/leverage). Was hardcoded 0.15.
cvar_threshold_base = 0.15
# Sprint 2: Kalman divergence threshold. Reject when |divergence| > this. Was hardcoded 0.03.
kalman_divergence_threshold = 0.03
# Sprint 2: Native spread quality thresholds (bps). Was hardcoded 50/100/200 in risk_arbiter.rs.
spread_quality_thin_bps = 50.0
spread_quality_wide_bps = 100.0
spread_quality_extreme_bps = 200.0

# P2-#31/#32/#33: LiquidationDefense thresholds (were hardcoded, diverged from [risk] values).
[risk.liquidation_defense]
flatten_drawdown_pct = 4.0              # Was hardcoded 2.0 — now aligned with risk.daily_drawdown_pct
halt_consecutive_stops = 8              # Was hardcoded 3 — now aligned with risk.consecutive_loss_halt
isa_ceiling_pct = 3.0                   # Block entries when ISA allowance < 3% of equity

# P2-B0.7: Macro indicator defaults — used when no live feed is available.
# These values determine the INITIAL regime before live data arrives.
# CRITICAL: Previously hardcoded as VIX=15/DXY=100/credit=100/F&G=50 → always "Normal".
# Now fail-safe: defaults trigger Caution regime until live data overrides.
[macro_defaults]
vix = 21.0                             # > 20 triggers Caution (fail-safe)
dxy = 100.0                            # Neutral
credit_spread_bps = 120.0              # Slightly elevated (Caution-adjacent)
fear_greed = 35.0                      # < 40 triggers Caution (fail-safe)
staleness_threshold_secs = 300         # 5 minutes — escalate to Reduce if stale

# VIX-tiered response (risk officer Item 8)
[risk.vix_tiers]
low_max = 18                       # VIX < 18: full allocation
elevated_max = 25                  # VIX 18-25: 50% max allocation, tighten stops
high_max = 35                      # VIX 25-35: 25% allocation, inverse only, no overnight
crisis_max = 50                    # VIX 35-50: SUSPEND all 3x longs. Inverse-only.
extreme = 50                       # VIX > 50: FULL TRADING HALT. Exits only.

# Q-051: UNIFIED COST MODEL — single source of truth for all cost parameters.
# ALL cost-related code MUST reference these values, not hardcode numbers.
# Replaces scattered hardcoded values in exit_engine.rs, smart_router.rs, and Python.
[costs]
# Round-trip trading cost as fraction (entry + exit spread + commission amortized).
# Used by Chandelier Rung 2 breakeven calculation and Kelly sizing.
round_trip_fee_pct = 0.003           # 0.3% round-trip — conservative for LSE 3x ETPs
# IBKR tiered commission minimum per trade (GBP).
ibkr_commission_gbp = 1.70           # IBKR tiered minimum for UK ISA
# Stamp duty (UK equities only — ETPs are exempt)
stamp_duty_pct = 0.0                 # 0% for ETPs/ETFs (would be 0.5% for UK equities)
# Financial Transaction Tax (0 for LSE ETPs)
ftt_pct = 0.0                        # 0% for UK ISA ETPs
# FX conversion cost (for USD-denominated LSE ETPs)
fx_conversion_pct = 0.002            # 0.2% IBKR FX spread estimate

# P3.1: Per-exchange round-trip cost as fraction (spread + commission + fees).
# Overrides round_trip_fee_pct for the specific exchange when available.
# Used by Kelly sizing and Chandelier breakeven calculation.
[costs.per_exchange]
LSE = 0.0035                         # LSE ETPs: wider spreads, stamp duty reserve
US = 0.0015                          # US equities: tight spreads, SEC fee
TSE = 0.0025                         # Tokyo: exchange fee + clearing
HKEX = 0.0030                        # Hong Kong: stamp duty + SFC levy
XETRA = 0.0020                       # Germany: exchange fee
EURONEXT = 0.0020                    # Paris: exchange fee
SGX = 0.0025                         # Singapore: clearing + GST


# See: python_brain/ouroboros/ibkr_market_scanner.py
[scanner.ibkr]
enabled = true
client_id = 103                      # Dedicated scanner client (engine=101, analytics=102)
max_scanners = 10                    # Max concurrent scanner subscriptions (IBKR limits ~10)
results_per_scanner = 50             # Max results per scanner request

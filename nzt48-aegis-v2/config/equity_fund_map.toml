# AEGIS V2 — Equity-to-Fund Mapping (Single Source of Truth)
#
# Maps US equities to ISA-eligible leveraged/inverse ETPs on LSE.
# Read by: radar_daemon.py, bridge.py, earnings_boost_producer.py
# Updated manually when new single-stock ETPs are listed on LSE.
#
# SESSION 35: Created to resolve conflicting maps in bridge.py:1108
# and earnings_boost_producer.py:47 (GPT3.L, 3LAM.L, 3SAM.L disagreed).
#
# CORRECT MAPPINGS (verified against GraniteShares product pages):
#   GPT3.L  → NVDA (AI/Tech basket, NVDA-heavy)
#   3LAM.L  → AMD  (GraniteShares 3x Long AMD — NOT AMZN!)
#   3SAM.L  → AMD  (GraniteShares 3x Short AMD — inverse of 3LAM.L)
#   AMZ3.L  → AMZN (GraniteShares 3x Long Amazon — distinct product)

[meta]
version = 1
description = "Maps US equities to ISA-eligible leveraged/inverse ETPs on LSE"

# ═══════════════════════════════════════════════════════════════════
# Single-Stock Mappings
# ═══════════════════════════════════════════════════════════════════

[single_stock.NVDA]
exchange = "NASDAQ"
long = ["NVD3.L", "3LNV.L"]
inverse = ["3SNV.L"]
leverage = 3
related = ["GPT3.L"]

[single_stock.TSLA]
exchange = "NASDAQ"
long = ["TSL3.L", "3LTS.L"]
inverse = ["3STS.L"]
leverage = 3

[single_stock.AAPL]
exchange = "NASDAQ"
long = ["APL3.L", "3LAP.L"]
inverse = ["3SAP.L"]
leverage = 3

[single_stock.MSFT]
exchange = "NASDAQ"
long = ["MSF3.L", "3LMS.L"]
inverse = ["3SMS.L"]
leverage = 3

[single_stock.AMD]
exchange = "NASDAQ"
long = ["AMD3.L", "3LAM.L"]
inverse = ["3SAM.L"]
leverage = 3

[single_stock.AMZN]
exchange = "NASDAQ"
long = ["AMZ3.L", "3LAZ.L"]

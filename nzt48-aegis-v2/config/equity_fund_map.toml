# ═══════════════════════════════════════════════════════════════════
# Index-Level Mappings (derived from equity breadth)
# ═══════════════════════════════════════════════════════════════════

[index.sp500]
components_top_n = 50
long = ["5SPY.L", "3LUS.L"]
inverse = ["3USS.L"]

[index.nasdaq100]
components_top_n = 30
long = ["QQQ5.L", "QQQ3.L"]
inverse = ["QQQS.L"]

[index.semiconductors]
components = ["NVDA", "AMD", "TSM", "MU", "AVGO", "QCOM"]
weights = [0.30, 0.20, 0.20, 0.10, 0.10, 0.10]
long = ["3SEM.L"]
inverse = []

# ═══════════════════════════════════════════════════════════════════
# Macro Signal Triggers
# ═══════════════════════════════════════════════════════════════════

[macro.gold]
trigger_equities = ["NEM", "GOLD", "AEM"]
trigger_direction = "BULLISH"
fund = "SGLN.L"

[macro.oil]
trigger_equities = ["XOM", "CVX", "BP.L", "SHEL.L"]
trigger_direction = "BULLISH"
fund = "CRUD.L"

[macro.risk_off]
trigger_equities = ["JPM", "GS", "HSBA.L", "BARC.L"]
trigger_direction = "BEARISH"
fund = "IDTL.L"

# ═══════════════════════════════════════════════════════════════════
# UCITS Equivalents (ISA-compatible alternatives to US ETFs)

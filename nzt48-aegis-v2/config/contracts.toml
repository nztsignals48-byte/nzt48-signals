# AEGIS V2 — IBKR Contract Definitions (H48)
# ConIDs resolved via reqContractDetails on first boot.
# con_id = 0 means "not yet resolved" — engine resolves on startup.
# Updated by nightly pipeline after successful resolution.
#
# SYMBOL CONVENTIONS:
#   LSE ETPs: include ".L" suffix (matches yfinance, e.g. QQQ3.L)
#   TSE (Tokyo): bare numeric codes (e.g. 7203)
#   HKEX: zero-padded 4-digit codes (e.g. 0700) — Rust strips leading zeros for IBKR API
#   KRX (Korea): zero-padded 6-digit codes (e.g. 005930) — Rust keeps leading zeros for IBKR
#   XETRA/EURONEXT: ticker symbols (e.g. SAP, ASML)
#   US/SMART: ticker symbols (e.g. AAPL, NVDA)
#
# Total: 753 contracts across 14 exchanges (expanded 2026-03-23 — +327 LSE equities)
# IBKR paper account supports 100 concurrent subscriptions — engine rotates based on market hours.


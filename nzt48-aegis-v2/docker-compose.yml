# AEGIS V2 — Docker Compose (Self-Contained)
# Includes IB Gateway, Redis, and Rust engine — no V1 dependency.
# IB Gateway: gnzsnz/ib-gateway (TRADING_MODE=live for real market data, port 4003)
# Engine: IS_LIVE=false, simulation_mode=true — NEVER submits real orders
# We connect live to get real market data; all trading is simulated internally
# Client ID: 101
#
# Usage:
#   docker compose up -d
#   docker compose logs -f aegis-v2
#
# PORT ASSIGNMENTS (ISS-005):
#   4003 = IB Gateway API (live trading mode, gnzsnz convention)
#   4001 = IB Gateway internal (not exposed to host)
#   6379 = Redis (internal Docker network only, password: nzt48redis)
#   8000 = Engine health/API endpoint (internal)

services:
  aegis-v2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    container_name: aegis-v2
    restart: unless-stopped
    depends_on:
      aegis-redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started  # Engine handles broker reconnect gracefully; don't block on IB Gateway health
    env_file:
      - .env
    environment:
      - IBKR_HOST=ib-gateway
      - IBKR_PORT=4003
      - REDIS_URL=redis://:nzt48redis@aegis-redis:6379/0
      - IS_LIVE=false
      # SC-13: Prevent Polars from starving Tokio async reactor (2 vCPU EC2)
      - POLARS_MAX_THREADS=1
    volumes:
      - ./config:/app/config
      - aegis-events:/app/events
      - aegis-data:/app/data
    # SC-01a: Graceful shutdown grace period (flatten positions + wait fills)
    stop_grace_period: 60s
    # SC-16: Shared memory for IPC
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "5"
    networks:
      - aegis-net

  # IB Gateway — headless IBKR API via IBC (auto-reconnect, auto-restart)
  # Image: gnzsnz/ib-gateway (IB Gateway + IBC, Xvfb for headless)
  # Weekly maintenance: user must approve 2FA on phone every Monday morning
  # Port 4003 = live trading API socat proxy (gnzsnz image convention)
  # TRADING_MODE=live in .env.production — engine IS_LIVE=false prevents real orders
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: aegis-ib-gateway
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - READ_ONLY_API=false
      - TWOFA_TIMEOUT_ACTION=restart
      - TWS_ACCEPT_INCOMING=accept
    expose:
      - "4001"
      - "4003"
    deploy:
      resources:
        limits:
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4003' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - aegis-net

  aegis-redis:
    image: redis:7-alpine
    container_name: aegis-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass nzt48redis
        --maxmemory 256mb
        --maxmemory-policy noeviction
        --appendonly yes
        --appendfsync everysec
    volumes:
      - aegis-redis-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nzt48redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - aegis-net

volumes:
  aegis-events:
  aegis-data:
  aegis-redis-data:

networks:
  aegis-net:
    driver: bridge

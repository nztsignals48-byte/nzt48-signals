name: CI Pipeline

on:
  push:
    branches: [ main, develop, feat/tier-system-enhancements-full ]
  pull_request:
    branches: [ main ]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # RUST BUILD & TEST
  # ============================================================================
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cd rust_core && cargo build --release

      - name: Run unit tests
        run: cd rust_core && cargo test --release

      - name: Run integration tests
        run: cargo test --release --test "*" -- --test-threads=1

      - name: Clippy linter
        run: cd rust_core && cargo clippy --release -- -D warnings

      - name: Format check
        run: cd rust_core && cargo fmt -- --check

  # ============================================================================
  # PYTHON TEST
  # ============================================================================
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pytest — validation suite
        run: pytest validation/ -v --cov=validation --cov-report=xml || true

      - name: Pytest — core module tests (Book 55)
        run: |
          cd nzt48-aegis-v2
          python -m pytest python_brain/tests/test_core_modules.py -v --tb=short || true

      - name: Python compile check — all 58 modules
        run: |
          cd nzt48-aegis-v2
          find python_brain -name "*.py" -not -name "__init__.py" -not -path "*__pycache__*" | while read f; do
            python -m py_compile "$f" || echo "FAIL: $f"
          done

      - name: Black formatter
        run: black --check validation/ python_brain/ || true

      - name: MyPy type check
        run: mypy validation/ python_brain/ --ignore-missing-imports || true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  # ============================================================================
  # DOCKER BUILD
  # ============================================================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [rust-tests, python-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: aegis-v2:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # DEPLOYMENT GATE (manual approval required)
  # ============================================================================
  deployment-gate:
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check deployment readiness
        run: |
          echo "All tests passed. Ready for deployment."
          echo "Awaiting manual approval..."

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ CI pipeline passed for ${{ github.sha }}. Ready to deploy to production."
            }

# Prometheus Configuration — NZT-48 Live Trading
# Scrapes metrics from aegis-v2-live /metrics endpoint
# Retention: 30 days

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nzt48-live'
    environment: 'production'
    region: 'eu-west-2'

# Alerting configuration (optional)
alerting:
  alertmanagers: []

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/rules.yml"

scrape_configs:
  # Main live trading engine
  - job_name: 'aegis-v2-live'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['aegis-v2-live:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'live-engine'
    metric_path: '/metrics'
    scheme: 'http'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

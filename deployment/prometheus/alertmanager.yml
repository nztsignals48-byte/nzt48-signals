# ==============================================================================
# Alertmanager Configuration for NZT-48
# Routes alerts to Telegram, email, or other channels
# ==============================================================================
global:
  resolve_timeout: 5m
  smtp_from: 'nzt48-alerts@example.com'
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: 'nzt48-alerts@example.com'
  smtp_auth_password: 'YOUR_SMTP_PASSWORD'

# Alert routing tree
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h
  receiver: 'telegram'

  # Route critical alerts immediately to Telegram + email
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
    group_wait: 0s
    repeat_interval: 1h

  # Warning alerts only to Telegram
  - match:
      severity: warning
    receiver: 'telegram'
    repeat_interval: 6h

  # Info alerts batched
  - match:
      severity: info
    receiver: 'telegram'
    repeat_interval: 24h

# Alert receivers
receivers:
- name: 'telegram'
  telegram_configs:
  - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN'
    chat_id: YOUR_TELEGRAM_CHAT_ID
    parse_mode: 'HTML'
    message: |
      <b>{{ .GroupLabels.alertname }}</b>
      {{ range .Alerts }}
      Status: {{ .Status }}
      Severity: {{ .Labels.severity }}
      {{ .Annotations.summary }}
      {{ .Annotations.description }}
      {{ end }}

- name: 'critical-alerts'
  telegram_configs:
  - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN'
    chat_id: YOUR_TELEGRAM_CHAT_ID
    parse_mode: 'HTML'
    message: |
      🚨 <b>CRITICAL ALERT</b> 🚨
      {{ .GroupLabels.alertname }}
      {{ range .Alerts }}
      {{ .Annotations.summary }}
      {{ .Annotations.description }}
      {{ end }}

  email_configs:
  - to: 'alerts@example.com'
    headers:
      Subject: '[NZT-48 CRITICAL] {{ .GroupLabels.alertname }}'
    html: |
      <h2>NZT-48 Critical Alert</h2>
      <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
      {{ range .Alerts }}
      <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
      <p><strong>Description:</strong> {{ .Annotations.description }}</p>
      <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
      <p><strong>Time:</strong> {{ .StartsAt }}</p>
      {{ end }}

# Inhibition rules (suppress alerts when others are firing)
inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname']

- source_match:
    alertname: 'NZT48EngineDown'
  target_match_re:
    alertname: 'NZT48.*'  # Suppress all other alerts if engine is down

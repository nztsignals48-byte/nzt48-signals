# ==============================================================================
# NZT-48 Secrets Template
# NEVER commit secrets to git - this is a template only
# ==============================================================================
# Create secrets manually via kubectl:
#
#   kubectl create secret generic nzt48-secrets \
#     --namespace=nzt48 \
#     --from-literal=redis-url='redis://:PASSWORD@nzt48-redis:6379/0' \
#     --from-literal=redis-password='PASSWORD' \
#     --from-literal=api-key='RANDOM_64_CHAR_HEX' \
#     --from-literal=ibkr-username='USERNAME' \
#     --from-literal=ibkr-password='PASSWORD' \
#     --from-literal=telegram-token='BOT_TOKEN' \
#     --from-literal=gsheets-credentials='JSON_CONTENT'
#
# Or use external secret management (AWS Secrets Manager, HashiCorp Vault, etc.)
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: nzt48-secrets
  namespace: nzt48
  labels:
    app: nzt48
type: Opaque
data:
  # Base64-encoded secrets (use: echo -n 'value' | base64)
  redis-url: REPLACE_WITH_BASE64_ENCODED_REDIS_URL
  redis-password: REPLACE_WITH_BASE64_ENCODED_PASSWORD
  api-key: REPLACE_WITH_BASE64_ENCODED_API_KEY
  ibkr-username: REPLACE_WITH_BASE64_ENCODED_IBKR_USERNAME
  ibkr-password: REPLACE_WITH_BASE64_ENCODED_IBKR_PASSWORD
  telegram-token: REPLACE_WITH_BASE64_ENCODED_TELEGRAM_TOKEN

---
# Google Sheets credentials (service account JSON)
apiVersion: v1
kind: Secret
metadata:
  name: nzt48-credentials
  namespace: nzt48
  labels:
    app: nzt48
type: Opaque
data:
  gsheets-service-account.json: REPLACE_WITH_BASE64_ENCODED_JSON
